name: Codespell

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

concurrency:
  group: codespell-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Codespell
        run: python -m pip install --upgrade 'codespell[toml]'

      - name: Run Codespell
        # skip + ignore-words-list live in .codespellrc so local runs match CI.
        # (CLI flags would override the config file, so keep them there.)
        run: codespell

