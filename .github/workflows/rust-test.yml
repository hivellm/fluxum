name: Rust Tests

# Quota discipline: pushes run ubuntu-only and only when Rust sources
# change; the full 3-OS matrix (NFR-09) runs weekly and on demand
# (workflow_dispatch) — Windows bills at 2x and macOS at 10x per minute.
on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'crates/**'
      - 'sdks/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust-test.yml'
  pull_request:
    branches: [ '**' ]
  schedule:
    - cron: '0 6 * * 1'  # weekly full-matrix run (Monday 06:00 UTC)
  workflow_dispatch:

concurrency:
  group: rust-test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
    - uses: actions/checkout@v5

    - name: Install toolchain from rust-toolchain.toml
      # PRD §9: honor the workspace's pinned nightly (edition 2024) instead
      # of pinning a channel in the workflow.
      run: rustup toolchain install

    - uses: Swatinem/rust-cache@v2

    - name: Install mold (Linux only)
      if: runner.os == 'Linux'
      uses: rui314/setup-mold@v1

    - name: Configure mold linker (Linux only)
      if: runner.os == 'Linux'
      run: |
        mkdir -p .cargo
        echo "[target.x86_64-unknown-linux-gnu]" >> .cargo/config.toml
        echo "linker = \"clang\"" >> .cargo/config.toml
        echo "rustflags = [\"-C\", \"link-arg=-fuse-ld=/usr/local/bin/mold\"]" >> .cargo/config.toml

    - name: Install nextest
      uses: taiki-e/install-action@nextest

    - name: Build
      run: cargo build --tests --workspace

    - name: Run tests
      run: cargo nextest run --workspace || cargo test --workspace

    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-${{ matrix.os }}.xml
        path: target/nextest/default/junit.xml
        if-no-files-found: ignore
