name: Rust Lint

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ '**' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install toolchain from rust-toolchain.toml
      # PRD §9: the workspace pins nightly (edition 2024) via
      # rust-toolchain.toml — workflows honor the file instead of pinning a
      # channel here. The bare invocation reads the file, including the
      # rustfmt/clippy components.
      run: rustup toolchain install

    - uses: Swatinem/rust-cache@v2

    - name: Check code formatting
      run: cargo fmt --all -- --check

    - name: Check cargo clippy warnings
      run: cargo clippy --workspace -- -D warnings

    - name: Check cargo clippy warnings for all targets
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Check cargo clippy warnings for all targets and features
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
