name: Rust Lint

# Quota discipline: runs only when Rust sources change; one consolidated
# clippy invocation (all targets + all features implies the default set).
on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'crates/**'
      - 'sdks/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust-lint.yml'
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

concurrency:
  group: rust-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install toolchain from rust-toolchain.toml
      # PRD §9: the workspace pins nightly (edition 2024) via
      # rust-toolchain.toml — workflows honor the file instead of pinning a
      # channel here. The bare invocation reads the file, including the
      # rustfmt/clippy components.
      run: rustup toolchain install

    - uses: Swatinem/rust-cache@v2

    - name: Check code formatting
      run: cargo fmt --all -- --check

    - name: Check cargo clippy warnings (all targets, all features)
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
